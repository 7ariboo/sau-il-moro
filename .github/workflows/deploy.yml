name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Cambia con il nome del tuo branch principale (es. master) se diverso

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout del codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Installazione dipendenze
        run: npm ci

      - name: 🏗️ Compilazione del progetto (Next.js)
        run: npm run build

      - name: 📂 Caricamento file via SFTP (SCP) su Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 194.164.64.46
          port: 65002
          username: u546807385
          password: ${{ secrets.SFTP_PASSWORD }}
          source: "package.json,next.config.ts,public/**,.next/**,!**/.next/cache/**"
          target: "./domains/sauilmoro.it/public_html/"
