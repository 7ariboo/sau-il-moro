name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Cambia con il nome del tuo branch principale (es. master) se diverso

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout del codice
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Installazione dipendenze
        run: npm ci

      - name: 🏗️ Compilazione del progetto (Next.js)
        run: npm run build

      - name: 📂 Caricamento file via SFTP su Hostinger
        uses: wangyucode/sftp-upload-action@v2.0.2
        with:
          host: 194.164.64.46
          port: 65002
          username: u546807385
          password: ${{ secrets.SFTP_PASSWORD }}
          localDir: './'
          remoteDir: './domains/sauilmoro.it/public_html/'
          exclude: '.git,.git/*,.github,.github/*,node_modules,node_modules/*,tests,tests/*,verification,verification/*,docs,docs/*,.cursor,.cursor/*,.next/cache,.next/cache/*,package-lock.json,.cursorrules,AGENTS.md,CLAUDE.md'
